<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="style.css">
		<link rel="icon" type="image/svg+xml" href="/Icons/App.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>6P9</title>
	</head>
	<body>
		<section id="Home" class="h-screen w-screen">
			<header class="[grid-area:Header] flex flex-row justify-between p-3">

				</button>
				</div>
			</header>
			<footer class="[grid-area:Footer] flex flex-row justify-around p-3">

				</button>

				</button>

							<br/>

						</p>	
					</div>
					<div class="Conjunto">
						<img class="Object img1" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Unofficial_JavaScript_logo_2.svg/30px-Unofficial_JavaScript_logo_2.svg.png" alt="">
						<img class="Object img2" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Python-logo-notext.svg/30px-Python-logo-notext.svg.png" alt="">
						<img class="Object img3" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Git_icon.svg/30px-Git_icon.svg.png" alt="">

						<img class="Object img5" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Three.js_Icon.svg/30px-Three.js_Icon.svg.png" alt="">
						<img class="Object img6" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Tailwind_CSS_Logo.svg/30px-Tailwind_CSS_Logo.svg.png" alt="">
